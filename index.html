<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS 499 ePortfolio</title>

<style>
:root {
  --bg: #f7f9fc;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --border: #e5e7eb;
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
}

header {
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: white;
  text-align: center;
  padding: 50px 20px;
}

nav ul {
  display: flex;
  justify-content: center;
  gap: 15px;
  list-style: none;
  padding: 10px;
  background: white;
}

nav a {
  text-decoration: none;
  font-weight: bold;
  color: var(--text);
}

.container {
  width: 90%;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 12px;
}

.artifact-grid {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.image-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.image-card img {
  width: 100%;
  height: 140px;
  object-fit: contain;
  cursor: pointer;
}

.narrative-links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.narrative-links a {
  text-decoration: none;
  font-weight: bold;
  color: var(--accent-dark);
  background: #eef2ff;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal img {
  max-width: 80%;
  margin: 5% auto;
  display: block;
}

.close {
  position: absolute;
  right: 20px;
  top: 10px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>Toni Britt's CS 499 ePortfolio</h1>
</header>

<nav>
<ul>
<li><a href="#artifacts">Artifacts</a></li>
<li><a href="#narratives">Narratives</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<div class="container">

<!-- ARTIFACTS -->
<section id="artifacts">
<h2>Artifacts</h2>

<div class="artifact-grid">

<div class="card">
<h3>Category 1</h3>
<div class="image-gallery">
<img src="software1.png" class="clickable">
<img src="software2.png" class="clickable">
<img src="software3.png" class="clickable">
</div>
</div>

<div class="card">
<h3>Category 2</h3>
<div class="image-gallery">
<img src="algorithms1.png" class="clickable">
<img src="algorithms2.png" class="clickable">
<img src="algorithms3.png" class="clickable">
</div>
</div>

<div class="card">
<h3>Category 3</h3>
<div class="image-gallery">
<img src="database1.png" class="clickable">
<img src="database2.png" class="clickable">
<img src="database3.png" class="clickable">
</div>
</div>

</div>
</section>

<!-- NARRATIVES -->
<section id="narratives">

<div class="card">
<h3>Professional Self-Assessment</h3>
<a href="https://github.com/britttoni/britttoni.github.io/raw/main/Professional%20Self.docx" target="_blank">
View Self-Assessment
</a>
</div>

<div class="card">
<h3>Enhancement Narratives</h3>

<div class="narrative-links">
<a href="https://github.com/britttoni/britttoni.github.io/raw/main/Category%201%20Narrative.docx" target="_blank">
Category 1 Narrative
</a>
<a href="https://github.com/britttoni/britttoni.github.io/raw/main/Category%202%20Narrative.docx" target="_blank">
Category 2 Narrative
</a>
<a href="https://github.com/britttoni/britttoni.github.io/raw/main/Category%203%20Narrative.docx" target="_blank">
Category 3 Narrative
</a>
</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact">
<div class="card">
<h3>Contact</h3>
<p>Email: toni.britt@snhu.edu</p>
</div>
</section>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close">&times;</span>
<img id="modalImg">
</div>

<script>
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

document.querySelectorAll(".clickable").forEach(img => {
  img.onclick = () => {
    modal.style.display = "block";
    modalImg.src = img.src;
  }
});

document.querySelector(".close").onclick = () => {
  modal.style.display = "none";
};

modal.onclick = () => {
  modal.style.display = "none";
};
</script>

</body>
</html>
